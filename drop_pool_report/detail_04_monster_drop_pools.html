*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:var(--bg);color:var(--text);line-height:1.45}

.desc{color:var(--muted);margin:0}
.toolbar{display:grid;grid-template-columns:minmax(220px,360px) 170px 1fr;gap:10px;align-items:center;margin:16px 0}
input,select,button{background:#151515;color:var(--text);border:1px solid #454545;border-radius:4px;padding:8px 10px;font:inherit;min-width:0}
button{cursor:pointer;background:#222}
button:hover{background:#2b2b2b}
.meta{color:var(--muted);font-size:13px;text-align:right}
.tableWrap{overflow:auto;border:1px solid var(--line);max-height:calc(100vh - 220px);background:#141414}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:13px}
th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 8px;vertical-align:top;white-space:nowrap}
td{background:#151515}
th{position:sticky;top:0;background:#242424;z-index:2;text-align:left;cursor:pointer;user-select:none}
thead tr.filters th{top:31px;background:#1c1c1c;cursor:default}
thead input,thead select{width:100%;padding:5px 6px;font-size:12px}
tr:hover td{background:#1b1b1b}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:10px;color:var(--muted)}
.empty{padding:24px;color:var(--muted)}
@media (max-width:760px){.toolbar{grid-template-columns:1fr}.meta{text-align:left}.tableWrap{max-height:none}}

.langSwitch{position:fixed;right:16px;top:12px;z-index:9999;display:flex;gap:4px;background:rgba(16,16,16,.92);border:1px solid #3a3a3a;border-radius:6px;padding:4px;box-shadow:0 4px 18px rgba(0,0,0,.35)}

.langSwitch button:hover{background:#2a2a2a}
.langSwitch button.active{background:#2d5f7a;border-color:#6fbce6;color:#fff}
body{padding-top:0}

const state = { global: "", filters: Array(headers.length).fill(""), sortIndex: -1, sortDir: 1, page: 1, pageSize: 100 };
const table = document.getElementById("dataTable");
const empty = document.getElementById("empty");
const meta = document.getElementById("meta");
const pageInfo = document.getElementById("pageInfo");
const globalSearch = document.getElementById("globalSearch");
const pageSize = document.getElementById("pageSize");

function uniqueValues(index) {
  const values = [...new Set(rows.map(r => r[index] || "").filter(Boolean))];
  values.sort((a,b) => String(a).localeCompare(String(b), "zh-Hant", { numeric:true }));
  return values.length <= 80 ? values : null;
}

function buildTableShell() {
  const head = document.createElement("thead");
  const tr = document.createElement("tr");
  headers.forEach((h, i) => {
    const th = document.createElement("th");
    th.textContent = h;
    th.title = "點擊排序";
    th.addEventListener("click", () => {
      if (state.sortIndex === i) state.sortDir *= -1;
      else { state.sortIndex = i; state.sortDir = 1; }
      state.page = 1;
      render();
    });
    tr.appendChild(th);
  });
  const filters = document.createElement("tr");
  filters.className = "filters";
  headers.forEach((h, i) => {
    const th = document.createElement("th");
    const choices = uniqueValues(i);
    let control;
    if (choices && choices.length > 1 && choices.length <= 40) {
      control = document.createElement("select");
      const option = document.createElement("option");
      option.value = "";
      option.textContent = "全部";
      control.appendChild(option);
      choices.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        control.appendChild(opt);
      });
    } else {
      control = document.createElement("input");
      control.placeholder = "篩選";
    }
    control.dataset.index = i;
    control.addEventListener("input", event => {
      state.filters[i] = event.target.value.trim().toLowerCase();
      state.page = 1;
      render();
    });
    th.appendChild(control);
    filters.appendChild(th);
  });
  head.appendChild(tr);
  head.appendChild(filters);
  table.appendChild(head);
  table.appendChild(document.createElement("tbody"));
}

function filteredRows() {
  const global = state.global.toLowerCase();
  let result = rows.filter(row => {
    if (global && !row.some(cell => String(cell || "").toLowerCase().includes(global))) return false;
    for (let i = 0; i < state.filters.length; i++) {
      const filter = state.filters[i];
      if (filter && !String(row[i] || "").toLowerCase().includes(filter)) return false;
    }
    return true;
  });
  if (state.sortIndex >= 0) {
    const i = state.sortIndex;
    const dir = state.sortDir;
    result = result.slice().sort((a,b) => String(a[i] || "").localeCompare(String(b[i] || ""), "zh-Hant", { numeric:true }) * dir);
  }
  return result;
}

function render() {
  const result = filteredRows();
  const totalPages = Math.max(1, Math.ceil(result.length / state.pageSize));
  state.page = Math.min(Math.max(1, state.page), totalPages);
  const start = (state.page - 1) * state.pageSize;
  const shown = result.slice(start, start + state.pageSize);
  const tbody = table.tBodies[0];
  tbody.replaceChildren();
  const frag = document.createDocumentFragment();
  shown.forEach(row => {
    const tr = document.createElement("tr");
    headers.forEach((_, i) => {
      const td = document.createElement("td");
      td.textContent = row[i] || "";
      tr.appendChild(td);
    });
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
  empty.hidden = result.length !== 0;
  meta.textContent = `共 ${rows.length.toLocaleString()} 筆，篩選後 ${result.length.toLocaleString()} 筆`;
  pageInfo.textContent = `第 ${state.page} / ${totalPages} 頁`;
}

globalSearch.addEventListener("input", e => { state.global = e.target.value.trim(); state.page = 1; render(); });
pageSize.addEventListener("change", e => { state.pageSize = Number(e.target.value); state.page = 1; render(); });
document.getElementById("prevPage").addEventListener("click", () => { state.page--; render(); });
document.getElementById("nextPage").addEventListener("click", () => { state.page++; render(); });
document.getElementById("resetFilters").addEventListener("click", () => {
  state.global = "";
  state.filters = Array(headers.length).fill("");
  state.sortIndex = -1;
  state.sortDir = 1;
  state.page = 1;
  globalSearch.value = "";
  document.querySelectorAll("thead input, thead select").forEach(el => el.value = "");
  render();
});
buildTableShell();
render();
</script>

    "同池同稀有度總權重":"Same Pool/Grade Total Weight",
    "同池同稀有度占比":"Same Pool/Grade Share",
    "同池總明細權重":"Pool Total Detail Weight",
    "同池明細粗占比":"Pool Detail Rough Share",
    "難度":"Difficulty",
    "項目數":"Item Count",
    "總權重":"Total Weight",
    "例子":"Examples",
    "類別":"Category",
    "稀有度":"Grade",
    "火 -25%":"Fire -25%",
    "水 -25%":"Water -25%",
    "風 -25%":"Wind -25%",
    "火 -50%":"Fire -50%",
    "水 -50%":"Water -50%",
    "風 -50%":"Wind -50%",
    "無明顯弱點":"No obvious weakness",
    "火 +25%":"Fire +25%",
    "水 +25%":"Water +25%",
    "風 +25%":"Wind +25%",
    "野獸":"Beast",
    "異界":"Eldritch",
    "人類":"Human",
    "褻瀆":"Blasphemy",
    "幻影":"Phantasm",
    "機械":"Machine",
    "植物":"Plant",
    "武器":"Weapon",
    "飾品":"Accessory",
    "圖紙":"Blueprint",
    "藥品":"Medicine",
    "材料":"Material",
    "貨幣":"Currency",
    "換金物":"Valuable",
    "唱片":"Music Disc",
    "未分類":"Uncategorized"
  }));
  function toHans(text){
    let out = String(text);
    for (const [a,b] of Object.entries(zhHansPhrases)) out = out.split(a).join(b);
    return out.replace(/[\u4e00-\u9fff]/g, ch => zhHansChars[ch] || ch);
  }
  function toEnglish(text){
    const s = String(text);
    const trimmed = s.trim();
    if (!trimmed) return s;
    if (en.has(trimmed)) return s.replace(trimmed, en.get(trimmed));
    let out = s;
    const entries = [...en.entries()].sort((a,b)=>b[0].length-a[0].length);
    for (const [a,b] of entries) out = out.split(a).join(b);
    return out;
  }
  const nodes = [];
  function collect(){
    nodes.length = 0;
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const p = node.parentElement;
        if (!p || ["SCRIPT","STYLE","TEXTAREA"].includes(p.tagName)) return NodeFilter.FILTER_REJECT;
        if (!node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    while (walker.nextNode()) {
      const n = walker.currentNode;
      if (!n.__origText) n.__origText = n.nodeValue;
      nodes.push(n);
    }
  }
  function apply(lang){
    localStorage.setItem(KEY, lang);
    collect();
    for (const n of nodes) {
      const src = n.__origText || n.nodeValue;
      n.nodeValue = lang === "zh-Hant" ? src : (lang === "zh-Hans" ? toHans(src) : toEnglish(src));
    }
    document.querySelectorAll(".langSwitch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===lang));
    document.documentElement.lang = lang;
  }
  function install(){
    const box = document.createElement("div");
    box.className = "langSwitch";
    box.innerHTML = '<button data-lang="zh-Hant">繁體</button><button data-lang="zh-Hans">簡體</button><button data-lang="en">EN</button>';
    box.addEventListener("click", e=>{ if(e.target.dataset.lang) apply(e.target.dataset.lang); });
    document.body.appendChild(box);
    setTimeout(()=>apply(localStorage.getItem(KEY)||"zh-Hant"), 0);
    const mo = new MutationObserver(()=>{ const lang=localStorage.getItem(KEY)||"zh-Hant"; if(lang!=="zh-Hant") setTimeout(()=>apply(lang),0); });
    mo.observe(document.body,{childList:true,subtree:true});
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", install);
  else install();
})();
</script>
